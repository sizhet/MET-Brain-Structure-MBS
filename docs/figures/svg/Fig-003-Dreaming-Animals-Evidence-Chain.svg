<text x="800.0" y="62" text-anchor="middle" font-size="40" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif">Fig-003: Dreaming Animals Evidence Chain</text>
<text x="800.0" y="105" text-anchor="middle" font-size="22" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif">Dreaming suggests an ancient embodied scene runtime</text>
<g filter="url(#shadow)"><rect x="80" y="350" width="220" height="140" rx="26" fill="#DCFCE7" stroke="#16A34A" stroke-width="4"/><text x="190.0" y="393.84" text-anchor="middle" font-size="24" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif"><tspan x="190.0" dy="0">Dreaming</tspan><tspan x="190.0" dy="28.32">Animals</tspan></text><text x="190.0" y="447.38" text-anchor="middle" font-size="18" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif"><tspan x="190.0" dy="0">humans, dogs, cats,</tspan><tspan x="190.0" dy="21.24">mammals</tspan></text></g><g filter="url(#shadow)"><rect x="360" y="350" width="220" height="140" rx="26" fill="#EDE9FE" stroke="#7C3AED" stroke-width="4"/><text x="470.0" y="393.84" text-anchor="middle" font-size="24" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif"><tspan x="470.0" dy="0">Embodied</tspan><tspan x="470.0" dy="28.32">Scene Runtime</tspan></text><text x="470.0" y="447.38" text-anchor="middle" font-size="18" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif"><tspan x="470.0" dy="0">objects, actions, places,</tspan><tspan x="470.0" dy="21.24">emotions</tspan></text></g><g filter="url(#shadow)"><rect x="640" y="350" width="220" height="140" rx="26" fill="#FEF3C7" stroke="#D97706" stroke-width="4"/><text x="750.0" y="393.84" text-anchor="middle" font-size="24" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif"><tspan x="750.0" dy="0">Triggered</tspan><tspan x="750.0" dy="28.32">Retrieval</tspan></text><text x="750.0" y="447.38" text-anchor="middle" font-size="18" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif"><tspan x="750.0" dy="0">memory activation without</tspan><tspan x="750.0" dy="21.24">external input</tspan></text></g><g filter="url(#shadow)"><rect x="920" y="350" width="220" height="140" rx="26" fill="#DBEAFE" stroke="#2563EB" stroke-width="4"/><text x="1030.0" y="393.84" text-anchor="middle" font-size="24" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif"><tspan x="1030.0" dy="0">Tunnel</tspan><tspan x="1030.0" dy="28.32">Activation</tspan></text><text x="1030.0" y="447.38" text-anchor="middle" font-size="18" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif"><tspan x="1030.0" dy="0">pathways replayed or</tspan><tspan x="1030.0" dy="21.24">refined</tspan></text></g><g filter="url(#shadow)"><rect x="1200" y="350" width="220" height="140" rx="26" fill="#FFE4E6" stroke="#E11D48" stroke-width="4"/><text x="1310.0" y="393.84" text-anchor="middle" font-size="24" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif"><tspan x="1310.0" dy="0">MBS</tspan><tspan x="1310.0" dy="28.32">Evidence</tspan></text><text x="1310.0" y="447.38" text-anchor="middle" font-size="18" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif"><tspan x="1310.0" dy="0">runtime older than</tspan><tspan x="1310.0" dy="21.24">language</tspan></text></g><line x1="308" y1="420" x2="348" y2="420" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="588" y1="420" x2="628" y2="420" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="868" y1="420" x2="908" y2="420" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="1148" y1="420" x2="1188" y2="420" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><text x="800" y="614.6" text-anchor="middle" font-size="30" font-weight="700" fill="#0F172A" font-family="Arial, Helvetica, sans-serif"><tspan x="800" dy="0">If dream-like runtime appears across animals,</tspan><tspan x="800" dy="35.4">it may reveal a pre-linguistic structural layer of</tspan><tspan x="800" dy="35.4">cognition.</tspan></text></svg>