<text x="800.0" y="62" text-anchor="middle" font-size="40" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif">Fig-006: Cognitive Convergence by Trigger Convergence</text>
<text x="800.0" y="105" text-anchor="middle" font-size="22" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif">Similar pressures can shape similar cognition</text>
