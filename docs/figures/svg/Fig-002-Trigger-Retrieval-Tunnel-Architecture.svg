<rect width="100%" height="100%" fill="#F8FAFC"/>
<text x="800.0" y="62" text-anchor="middle" font-size="40" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif">Fig-002: Trigger-Retrieval-Tunnel Architecture</text>
<text x="800.0" y="105" text-anchor="middle" font-size="22" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif">Five layers of the MBS structural runtime</text>
<g filter="url(#shadow)"><rect x="300" y="200" width="1000" height="92" rx="26" fill="#FFE4E6" stroke="#E11D48" stroke-width="4"/><text x="800.0" y="234.0" text-anchor="middle" font-size="25" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif">Layer 1: Trigger Layer</text><text x="800.0" y="284.0" text-anchor="middle" font-size="18" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif">significance, danger, goals</text></g><g filter="url(#shadow)"><rect x="300" y="330" width="1000" height="92" rx="26" fill="#FEF3C7" stroke="#D97706" stroke-width="4"/><text x="800.0" y="364.0" text-anchor="middle" font-size="25" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif">Layer 2: Retrieval Layer</text><text x="800.0" y="414.0" text-anchor="middle" font-size="18" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif">classification, similarity, indexing</text></g><g filter="url(#shadow)"><rect x="300" y="460" width="1000" height="92" rx="26" fill="#DBEAFE" stroke="#2563EB" stroke-width="4"/><text x="800.0" y="494.0" text-anchor="middle" font-size="25" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif">Layer 3: Graph &amp; Tunnel Layer</text><text x="800.0" y="544.0" text-anchor="middle" font-size="18" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif">Calling Graphs, Function Tunnels, scenes</text></g><g filter="url(#shadow)"><rect x="300" y="590" width="1000" height="92" rx="26" fill="#EDE9FE" stroke="#7C3AED" stroke-width="4"/><text x="800.0" y="624.0" text-anchor="middle" font-size="25" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif">Layer 4: Embodied Runtime</text><text x="800.0" y="674.0" text-anchor="middle" font-size="18" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif">dream, action, imagination, planning</text></g><g filter="url(#shadow)"><rect x="300" y="720" width="1000" height="92" rx="26" fill="#DCFCE7" stroke="#16A34A" stroke-width="4"/><text x="800.0" y="754.0" text-anchor="middle" font-size="25" font-weight="800" fill="#0F172A" font-family="Arial, Helvetica, sans-serif">Layer 5: In-Situ Evolution</text><text x="800.0" y="804.0" text-anchor="middle" font-size="18" font-weight="500" fill="#475569" font-family="Arial, Helvetica, sans-serif">learning, adaptation, reinforcement</text></g><line x1="800" y1="292" x2="800" y2="327" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="800" y1="422" x2="800" y2="457" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="800" y1="552" x2="800" y2="587" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="800" y1="682" x2="800" y2="717" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><text x="160" y="500.84" text-anchor="middle" font-size="24" font-weight="700" fill="#475569" font-family="Arial, Helvetica, sans-serif"><tspan x="160" dy="0">Top-down</tspan><tspan x="160" dy="28.32">activation</tspan></text><line x1="230" y1="245" x2="230" y2="780" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="10 10"/><text x="1440" y="500.84" text-anchor="middle" font-size="24" font-weight="700" fill="#475569" font-family="Arial, Helvetica, sans-serif"><tspan x="1440" dy="0">Bottom-up</tspan><tspan x="1440" dy="28.32">adaptation</tspan></text><line x1="1370" y1="780" x2="1370" y2="245" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="10 10"/></svg>